# ============================================================
# redis.yaml — CLEAN & FIXED VERSION
# ============================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: redis-config
  namespace: databases
data:
  redis-master.conf: |
    bind 0.0.0.0
    port 6379
    requirepass ${REDIS_PASSWORD}
    masterauth ${REDIS_PASSWORD}
    appendonly yes
    loglevel notice
  redis-replica.conf: |
    bind 0.0.0.0
    port 6379
    requirepass ${REDIS_PASSWORD}
    masterauth ${REDIS_PASSWORD}
    replicaof redis-0.redis-headless.databases.svc.cluster.local 6379
    replica-read-only yes
    appendonly yes
    loglevel notice
  sentinel.conf: |
    port 26379
    sentinel monitor mymaster 127.0.0.1 6379 2
    sentinel auth-pass mymaster ${REDIS_PASSWORD}
    sentinel down-after-milliseconds mymaster 5000
    sentinel failover-timeout mymaster 60000
    sentinel parallel-syncs mymaster 1
  start-redis.sh: |
    #!/bin/sh
    sed "s/\${REDIS_PASSWORD}/$REDIS_PASSWORD/g" /etc/redis/redis-master.conf  > /tmp/redis-master.conf
    sed "s/\${REDIS_PASSWORD}/$REDIS_PASSWORD/g" /etc/redis/redis-replica.conf > /tmp/redis-replica.conf
    ORDINAL=$(echo $HOSTNAME | rev | cut -d'-' -f1 | rev)
    if [ "$ORDINAL" = "0" ]; then
      exec redis-server /tmp/redis-master.conf
    else
      exec redis-server /tmp/redis-replica.conf
    fi

---
apiVersion: v1
kind: Service
metadata:
  name: redis-headless
  namespace: databases
spec:
  clusterIP: None
  ports:
    - name: redis
      port: 6379
    - name: sentinel
      port: 26379
  selector:
    app: redis

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis
  namespace: databases
spec:
  serviceName: redis-headless
  replicas: 3
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      initContainers:
        - name: init-redis
          image: redis:6.2-alpine
          command: ["sh", "-c", "cp /config/start-redis.sh /scripts/start-redis.sh && chmod +x /scripts/start-redis.sh"]
          volumeMounts:
            - name: redis-config-vol
              mountPath: /config
            - name: scripts-vol
              mountPath: /scripts
      containers:
        - name: redis
          image: redis:6.2-alpine
          command: ['/scripts/start-redis.sh']
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: redis-secret
                  key: redis-password
          livenessProbe:
            exec:
              command: ["sh", "-c", "redis-cli -a $REDIS_PASSWORD ping | grep PONG"]
            initialDelaySeconds: 30
          volumeMounts:
            - name: redis-data
              mountPath: /data
            - name: redis-config-vol
              mountPath: /etc/redis
            - name: scripts-vol
              mountPath: /scripts
        - name: sentinel
          image: redis:6.2-alpine
          command:
            - sh
            - -c
            - "sed \"s/\\${REDIS_PASSWORD}/$REDIS_PASSWORD/g\" /etc/sentinel/sentinel.conf > /data/sentinel.conf && exec redis-sentinel /data/sentinel.conf"
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: redis-secret
                  key: redis-password
          volumeMounts:
            - name: sentinel-config-vol
              mountPath: /etc/sentinel
            - name: sentinel-data-vol
              mountPath: /data
      volumes:
        - name: redis-config-vol
          configMap:
            name: redis-config
            items:
              - key: redis-master.conf
                path: redis-master.conf
              - key: redis-replica.conf
                path: redis-replica.conf
              - key: start-redis.sh
                path: start-redis.sh
        - name: sentinel-config-vol
          configMap:
            name: redis-config
            items:
              - key: sentinel.conf
                path: sentinel.conf
        - name: scripts-vol
          emptyDir: {}
        - name: sentinel-data-vol
          emptyDir: {}
  volumeClaimTemplates:
    - metadata:
        name: redis-data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: standard
        resources:
          requests:
            storage: 2Gi
