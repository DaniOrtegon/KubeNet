# ============================================================
# velero.yaml — Backup completo del clúster con Velero
#
# ESTRATEGIA:
#   - Backend: MinIO local (bucket: velero-backups)
#   - Schedule: diario a la 1:00 AM (Europe/Madrid)
#   - Namespaces: wordpress + databases
#   - Retención: 30 días (720h)
#   - Incluye: objetos K8s + snapshots de PVCs (CSI)
# ============================================================

# ------------------------------------------------------------
# Job: Crear bucket velero-backups en MinIO antes de instalar Velero
# ------------------------------------------------------------
apiVersion: batch/v1
kind: Job
metadata:
  name: velero-bucket-setup
  namespace: storage
  labels:
    app: velero-setup
    app.kubernetes.io/part-of: wordpress-ha
    app.kubernetes.io/component: backup
spec:
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        app: velero-setup
    spec:
      restartPolicy: OnFailure
      containers:
        - name: mc
          # FIXED: Resolved conflict using specific stable release
          image: minio/mc:RELEASE.2025-08-13T08-35-41Z
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
            - |
              set -e
              echo "=== Creando bucket velero-backups en MinIO ==="

              # Configura el alias del cliente mc
              mc alias set local \
                http://minio.storage.svc.cluster.local:9000 \
                "${MINIO_ROOT_USER}" "${MINIO_ROOT_PASSWORD}"

              # Crea el bucket 'velero-backups'
              mc mb local/velero-backups --ignore-existing
              echo "✅ Bucket velero-backups listo"

              # Verifica
              mc ls local/
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: minio-secret
                  key: root-user
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: minio-secret
                  key: root-password
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi

---
# ------------------------------------------------------------
# NetworkPolicy: Velero puede acceder a MinIO y a la API de K8s
# ------------------------------------------------------------
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-velero-egress
  namespace: velero
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: velero
  policyTypes:
    - Egress
  egress:
    # Regla 1: MinIO
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: storage
      ports:
        - port: 9000
    # Regla 2: Kubernetes API
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - port: 6443
        - port: 443
    # Regla 3: DNS
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
