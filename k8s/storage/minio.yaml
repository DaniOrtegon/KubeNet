# ============================================================
# minio.yaml — Final Working Version
# ============================================================

apiVersion: v1
kind: Namespace
metadata:
  name: storage

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: minio-pvc
  namespace: storage
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: standard
  resources:
    requests:
      storage: 10Gi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: minio
  namespace: storage
spec:
  replicas: 1
  selector:
    matchLabels:
      app: minio
  template:
    metadata:
      labels:
        app: minio
    spec:
      containers:
        - name: minio
          image: quay.io/minio/minio:RELEASE.2024-01-16T16-07-38Z
          imagePullPolicy: IfNotPresent
          command: ["minio", "server", "/data", "--console-address", ":9001"]
          ports:
            - containerPort: 9000
            - containerPort: 9001
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: minio-secret
                  key: root-user
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: minio-secret
                  key: root-password
          volumeMounts:
            - name: minio-data
              mountPath: /data
      volumes:
        - name: minio-data
          persistentVolumeClaim:
            claimName: minio-pvc

---
apiVersion: v1
kind: Service
metadata:
  name: minio
  namespace: storage
spec:
  ports:
    - name: api
      port: 9000
    - name: console
      port: 9001
  selector:
    app: minio

---
apiVersion: batch/v1
kind: Job
metadata:
  name: minio-setup
  namespace: storage
spec:
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: setup
          # USE THE SAME IMAGE AS THE SERVER TO AVOID PULL ERRORS
          image: quay.io/minio/minio:RELEASE.2024-01-16T16-07-38Z
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              echo "Esperando a MinIO..."
              # In the server image, 'mc' is available as a command
              until mc alias set local http://minio.storage.svc.cluster.local:9000 \
                    "${MINIO_ROOT_USER}" "${MINIO_ROOT_PASSWORD}" &>/dev/null; do
                sleep 3
              done
              mc mb --ignore-existing local/wordpress-uploads
              mc anonymous set download local/wordpress-uploads
              mc mb --ignore-existing local/wordpress-backups
              echo "=== Configuración Completada ==="
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: minio-secret
                  key: root-user
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: minio-secret
                  key: root-password
