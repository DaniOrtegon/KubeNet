# ============================================================
# GRAFANA - Namespace: monitoring
# Visualización de métricas (Prometheus) y logs (Loki)
# Acceso: http://<minikube-ip>:30030
# ============================================================

# Almacena la base de datos SQLite de Grafana: usuarios, orgs, alertas y ajustes de la UI
# --- PersistentVolumeClaim para Grafana ---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: grafana-pvc
  namespace: monitoring
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
  storageClassName: standard

---
# --- ConfigMap: provisioning de datasources (Prometheus + Loki) ---
# Grafana carga este fichero al arrancar y configura las fuentes de datos automáticamente
# access: proxy — Grafana hace las consultas desde el servidor, no desde el browser del usuario
# isDefault: true en Prometheus — se usa como datasource por defecto en nuevos paneles
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: monitoring
data:
  datasources.yml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus.monitoring.svc.cluster.local:9090
        isDefault: true
        editable: false
      - name: Loki
        type: loki
        access: proxy
        url: http://loki.monitoring.svc.cluster.local:3100
        editable: false
      - name: Jaeger
        type: jaeger
        access: proxy
        url: http://jaeger.monitoring.svc.cluster.local:16686
        editable: false

---
# Indica a Grafana dónde buscar ficheros JSON de dashboards para importar automáticamente
# disableDeletion: true — los dashboards provisionados no se pueden borrar desde la UI
# updateIntervalSeconds: 30 — Grafana recarga los dashboards del disco cada 30 segundos
# --- ConfigMap: provisioning de dashboards ---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-provider
  namespace: monitoring
data:
  dashboards.yml: |
    apiVersion: 1
    providers:
      - name: 'default'
        orgId: 1
        folder: 'Kubernetes'
        type: file
        disableDeletion: true
        updateIntervalSeconds: 30
        options:
          path: /var/lib/grafana/dashboards
          foldersFromFilesStructure: true

---
# --- Deployment de Grafana ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: monitoring
  labels:
    app: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      securityContext:
        fsGroup: 472       # UID/GID del usuario grafana en la imagen oficial — acceso de escritura al PVC
        runAsUser: 472
        runAsNonRoot: true  # Cumple con PodSecurityStandard baseline
      containers:
        - name: grafana
          image: grafana/grafana:10.2.3   # Versión fija para reproducibilidad
          ports:
            - containerPort: 3000
          env:
            - name: GF_SECURITY_ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: grafana-secret
                  key: admin-user
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: grafana-secret
                  key: admin-password
            - name: GF_PATHS_PROVISIONING
              value: /etc/grafana/provisioning  # Indica a Grafana el directorio raíz de provisioning (datasources + dashboards)
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 15
          volumeMounts:
            - name: grafana-storage
              mountPath: /var/lib/grafana           # PVC: persiste SQLite, plugins instalados y sesiones
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources  # ConfigMap grafana-datasources: Prometheus + Loki + Jaeger
            - name: dashboard-provider
              mountPath: /etc/grafana/provisioning/dashboards  # ConfigMap grafana-dashboard-provider: indica dónde leer los JSON
      volumes:
        - name: grafana-storage
          persistentVolumeClaim:
            claimName: grafana-pvc
        - name: datasources
          configMap:
            name: grafana-datasources
        - name: dashboard-provider
          configMap:
            name: grafana-dashboard-provider

---
# --- Service de Grafana (ClusterIP) ---
# Expuesto al exterior via Ingress (08-ingress.yaml) en grafana.monitoring.local
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: monitoring
spec:
  type: ClusterIP   # Solo acceso interno; el Ingress termina TLS y hace proxy hacia este Service
  ports:
    - port: 3000
      targetPort: 3000
  selector:
    app: grafana
