# ============================================================
# ingress.yaml — Ingress con TLS (cert-manager self-signed)
# Expone WordPress y el stack de monitoring al exterior del clúster
# mediante el controlador NGINX Ingress, con TLS terminado en el
# Ingress y redirección forzada HTTP → HTTPS.
# ============================================================
# ------------------------------------------------------------
# Ingress para WordPress — namespace 'wordpress'
# cert-manager detecta la anotación y genera wordpress-tls
# automáticamente usando el ClusterIssuer 'ca-issuer'
# ------------------------------------------------------------
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: wordpress-ingress
  namespace: wordpress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /          # Normaliza la ruta raíz al backend
    nginx.ingress.kubernetes.io/proxy-body-size: "64m"     # Permite subir ficheros de hasta 64 MB (uploads WordPress)
    nginx.ingress.kubernetes.io/ssl-redirect: "true"       # Activa redirect 308 de HTTP a HTTPS
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true" # Garantiza redirect incluso si el cliente envía HTTP/1.0
    cert-manager.io/cluster-issuer: "ca-issuer"            # Indica a cert-manager qué ClusterIssuer usar para emitir el TLS
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - wp-k8s.local
      secretName: wordpress-tls
  rules:
    - host: wp-k8s.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: wordpress
                port:
                  number: 80
---
# ------------------------------------------------------------
# Ingress para Grafana y Prometheus — namespace 'monitoring'
# ------------------------------------------------------------
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: monitoring-ingress
  namespace: monitoring
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    cert-manager.io/cluster-issuer: "ca-issuer"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - grafana.monitoring.local
        - prometheus.monitoring.local
        - jaeger.monitoring.local      # SAN 3: Jaeger UI
      secretName: monitoring-tls       # Un único Secret cubre los tres hostnames
  rules:
    - host: grafana.monitoring.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: grafana
                port:
                  number: 3000
    - host: prometheus.monitoring.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: prometheus
                port:
                  number: 9090
    # Virtual host para Jaeger — UI de trazas distribuidas en puerto 16686
    - host: jaeger.monitoring.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: jaeger-query     # Service que expone la UI de Jaeger
                port:
                  number: 16686
















