<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>KubeNet — WordPress HA · Architecture</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Sora:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#040A10;font-family:'Sora',-apple-system,sans-serif;color:#CBD5E1;min-height:100vh}
button{font-family:inherit;cursor:pointer}

/* ── HEADER ── */
#header{border-bottom:1px solid #0F1F30;padding:14px 28px;display:flex;align-items:center;gap:16px;background:#060D16;position:sticky;top:0;z-index:50;flex-wrap:wrap}
.logo{width:36px;height:36px;border-radius:8px;background:linear-gradient(135deg,#0EA5E9,#6366F1);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;box-shadow:0 0 16px #0EA5E940}
.logo-title{font-size:15px;font-weight:800;color:#F1F5F9;letter-spacing:-0.3px}
.logo-sub{font-size:10px;color:#334155;font-family:'JetBrains Mono',monospace;margin-top:1px}
.tabs{margin-left:auto;display:flex;gap:4px;flex-wrap:wrap}
.tab-btn{background:transparent;border:1px solid transparent;color:#475569;border-radius:8px;padding:7px 15px;font-size:12px;font-weight:600;display:flex;align-items:center;gap:6px;transition:all .2s;letter-spacing:0.2px}
.tab-btn.active{background:#0F1F30;border-color:#0EA5E960;color:#7DD3FC;font-weight:700}

/* ── STATS ── */
#stats{display:flex;border-bottom:1px solid #0F1F30;background:#060D16}
.stat{flex:1;padding:10px 20px;border-right:1px solid #0F1F30;text-align:center}
.stat-val{font-size:20px;font-weight:800;font-family:'JetBrains Mono',monospace}
.stat-label{color:#334155;font-size:10px;margin-top:2px;letter-spacing:0.5px;text-transform:uppercase}

/* ── MAIN ── */
#main{padding:24px 28px;transition:padding-right .3s}
#main.panel-open{padding-right:420px}
.tab-content{display:none}
.tab-content.active{display:block}

/* ── DIAGRAM ── */
.diag-toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px}
.diag-hint{color:#334155;font-size:11px;font-family:'JetBrains Mono',monospace}
.diag-filters{display:flex;gap:6px;flex-wrap:wrap}
.flt-btn{background:transparent;border:1px solid #1A2F45;color:#475569;border-radius:6px;padding:5px 12px;font-size:11px;font-family:'JetBrains Mono',monospace;transition:all .2s;font-weight:600}
.flt-btn.active{background:#0F1F30;color:#E2E8F0;border-color:#475569}
.diagram-wrap{overflow-x:auto;background:#040A10;border:1px solid #0F1F30;border-radius:12px;padding:12px}
svg{display:block;margin:0 auto}
.legend{display:flex;gap:24px;justify-content:center;margin-top:16px;flex-wrap:wrap;align-items:center}
.legend-item{display:flex;align-items:center;gap:7px}
.legend-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0}
.legend-line{width:22px;height:2px;flex-shrink:0;border-radius:1px}
.legend-text{color:#475569;font-size:10px;font-family:'JetBrains Mono',monospace}
#conn-tip{position:fixed;background:#060D16;border:1px solid #1A2F45;border-radius:8px;padding:10px 14px;font-size:11px;color:#94A3B8;pointer-events:none;z-index:300;max-width:260px;font-family:'JetBrains Mono',monospace;box-shadow:0 8px 32px #00000099;display:none;line-height:1.6}

/* ── FILES ── */
.filter-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px}
.filter-btn{background:transparent;border:1px solid #1A2F45;color:#475569;border-radius:6px;padding:4px 12px;font-size:11px;transition:all .15s;font-family:'JetBrains Mono',monospace;font-weight:600}
.filter-btn.active{background:#0F1F30;border-color:#0EA5E960;color:#7DD3FC}
.files-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:12px}
.file-card{background:#060D16;border:1px solid #0F1F30;border-radius:10px;padding:16px;cursor:pointer;text-align:left;transition:all .2s;width:100%}
.file-card:hover{border-color:#1A3450;background:#080F1A;transform:translateY(-1px)}
.file-card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.file-card-left{display:flex;align-items:center;gap:8px}
.file-name{color:#E2E8F0;font-size:12px;font-weight:700;font-family:'JetBrains Mono',monospace}
.file-badge{border-radius:4px;padding:2px 8px;font-size:10px;white-space:nowrap;border:1px solid;font-family:'JetBrains Mono',monospace}
.file-desc{color:#475569;font-size:11px;line-height:1.7}

/* ── NAMESPACES ── */
.ns-list{display:flex;flex-direction:column;gap:14px}
.ns-block{border-radius:12px;overflow:hidden;border:1px solid}
.ns-header{width:100%;background:none;border:none;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;cursor:pointer}
.ns-header-left{display:flex;align-items:center;gap:12px}
.ns-dot{width:8px;height:8px;border-radius:50%}
.ns-title{font-size:14px;font-weight:700;font-family:'JetBrains Mono',monospace}
.ns-desc{color:#475569;font-size:11px}
.ns-right{display:flex;align-items:center;gap:8px}
.ns-count{border-radius:4px;padding:2px 8px;font-size:10px;border:1px solid;font-family:'JetBrains Mono',monospace}
.ns-body{padding:16px 20px;display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px}
.pod-card{background:#060D16;border-radius:8px;padding:12px 14px;cursor:pointer;text-align:left;transition:all .2s;border:1px solid;width:100%}
.pod-card:hover{transform:translateY(-1px)}
.pod-icon{font-size:22px;margin-bottom:6px}
.pod-name{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;margin-bottom:4px}
.pod-badges{display:flex;gap:4px;flex-wrap:wrap}
.pod-badge{border-radius:3px;padding:1px 6px;font-size:9px;font-family:'JetBrains Mono',monospace}
.pod-ports{margin-top:6px;color:#334155;font-size:10px;font-family:'JetBrains Mono',monospace}

/* ── DETAIL PANEL ── */
#detail-panel{position:fixed;right:0;top:0;bottom:0;width:395px;background:#060D16;z-index:100;overflow-y:auto;padding:24px;display:none;border-left:1px solid #0F1F30}
#detail-panel.open{display:block}
.dp-close{background:none;border:1px solid #1A2F45;color:#475569;padding:4px 10px;border-radius:6px;margin-bottom:20px;font-size:11px;font-family:'JetBrains Mono',monospace}
.dp-icon{font-size:32px;margin-bottom:12px}
.dp-kind{font-size:10px;font-family:'JetBrains Mono',monospace;margin-bottom:6px;text-transform:uppercase;letter-spacing:2px}
.dp-name{color:#E2E8F0;font-size:18px;font-weight:700;margin-bottom:16px;line-height:1.3}
.dp-image-box{background:#0A1520;border:1px solid #1A2F45;border-radius:6px;padding:8px 12px;margin-bottom:16px}
.dp-image-label{color:#334155;font-size:9px;margin-bottom:4px;text-transform:uppercase;letter-spacing:1px}
.dp-image-val{color:#7DD3FC;font-size:11px;font-family:'JetBrains Mono',monospace}
.dp-desc{color:#64748B;font-size:12px;line-height:1.8;margin-bottom:20px}
.dp-sec-label{color:#334155;font-size:9px;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;font-family:'JetBrains Mono',monospace}
.dp-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px}
.dp-connect-item{background:#0A1520;border:1px solid #1A2F45;color:#94A3B8;border-radius:4px;padding:5px 10px;font-size:10px;font-family:'JetBrains Mono',monospace;display:flex;flex-direction:column;gap:2px}
.dp-connect-proto{color:#334155;font-size:9px}
.dp-concept{background:#0F1F30;border:1px solid #1A2F45;color:#64748B;border-radius:4px;padding:2px 8px;font-size:10px;font-family:'JetBrains Mono',monospace}

/* ── FLOW ── */
.flow-wrap{max-width:860px;margin:0 auto}
.flow-step{display:flex;align-items:flex-start;gap:20px;margin-bottom:6px}
.flow-left{display:flex;flex-direction:column;align-items:center;flex-shrink:0}
.flow-num{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:800;font-family:'JetBrains Mono',monospace;border:2px solid;flex-shrink:0}
.flow-vline{width:2px;flex:1;min-height:20px;margin-top:4px}
.flow-body{background:#060D16;border:1px solid #0F1F30;border-radius:12px;padding:16px 20px;flex:1}
.flow-title{font-size:13px;font-weight:700;margin-bottom:6px;display:flex;align-items:center;gap:8px}
.flow-desc{color:#475569;font-size:12px;line-height:1.7}
.flow-children{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:8px;margin-top:12px}
.flow-child{background:#0A1520;border:1px solid #1A2F45;border-radius:8px;padding:10px;display:flex;gap:8px}
.flow-child-name{color:#E2E8F0;font-size:10px;font-weight:700;margin-bottom:3px;font-family:'JetBrains Mono',monospace}
.flow-child-desc{color:#475569;font-size:11px;line-height:1.5}
.flow-tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.flow-tag{border-radius:4px;padding:2px 8px;font-size:9px;font-family:'JetBrains Mono',monospace;border:1px solid}
.flow-arrow{text-align:center;color:#1A2F45;font-size:16px;margin:0 0 6px 50px}

@media(max-width:700px){
  #main.panel-open{padding-right:24px}
  #detail-panel{width:100%;top:auto;height:65vh}
  .files-grid{grid-template-columns:1fr}
  .tabs{margin-left:0}
  #stats{flex-wrap:wrap}
  .stat{min-width:33%}
}
</style>
</head>
<body>
<div id="header">
  <div class="logo">⎈</div>
  <div>
    <div class="logo-title">KubeNet</div>
    <div class="logo-sub">WordPress HA · Minikube · 7 namespaces · 19 NetworkPolicies</div>
  </div>
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('diagram')">🗺️ Arquitectura</button>
    <button class="tab-btn" onclick="switchTab('files')">📄 Archivos</button>
    <button class="tab-btn" onclick="switchTab('namespaces')">📦 Namespaces</button>
    <button class="tab-btn" onclick="switchTab('flow')">🔄 Flujo</button>
  </div>
</div>
<div id="stats">
  <div class="stat"><div class="stat-val" style="color:#0EA5E9">7</div><div class="stat-label">Namespaces</div></div>
  <div class="stat"><div class="stat-val" style="color:#10B981">14</div><div class="stat-label">Workloads</div></div>
  <div class="stat"><div class="stat-val" style="color:#F59E0B">21</div><div class="stat-label">YAMLs</div></div>
  <div class="stat"><div class="stat-val" style="color:#EC4899">19</div><div class="stat-label">NetworkPolicies</div></div>
  <div class="stat"><div class="stat-val" style="color:#8B5CF6">2</div><div class="stat-label">Certs TLS</div></div>
  <div class="stat"><div class="stat-val" style="color:#F97316">3</div><div class="stat-label">CronJobs</div></div>
</div>

<div id="main">
  <!-- DIAGRAM -->
  <div id="tab-diagram" class="tab-content active">
    <div class="diag-toolbar">
      <div class="diag-hint">↔ hover para conexiones · clic para detalles</div>
      <div class="diag-filters">
        <button class="flt-btn active" onclick="setLayer(event,'all')">Todo</button>
        <button class="flt-btn" onclick="setLayer(event,'app')" style="color:#0EA5E9">App</button>
        <button class="flt-btn" onclick="setLayer(event,'data')" style="color:#F59E0B">Datos</button>
        <button class="flt-btn" onclick="setLayer(event,'obs')" style="color:#10B981">Observabilidad</button>
        <button class="flt-btn" onclick="setLayer(event,'sec')" style="color:#EC4899">Seguridad</button>
        <button class="flt-btn" onclick="setLayer(event,'bkp')" style="color:#F97316">Backup</button>
      </div>
    </div>
    <div class="diagram-wrap">
      <svg id="arch-svg" width="1108" height="555" viewBox="0 0 1108 555"></svg>
    </div>
    <div class="legend" id="legend"></div>
  </div>

  <!-- FILES -->
  <div id="tab-files" class="tab-content">
    <div class="filter-bar" id="filter-bar"></div>
    <div class="files-grid" id="files-grid"></div>
  </div>

  <!-- NAMESPACES -->
  <div id="tab-namespaces" class="tab-content">
    <div class="ns-list" id="ns-list"></div>
  </div>

  <!-- FLOW -->
  <div id="tab-flow" class="tab-content">
    <div class="flow-wrap" id="flow-container"></div>
  </div>
</div>

<!-- PANEL -->
<div id="detail-panel">
  <button class="dp-close" onclick="closePanel()">← cerrar</button>
  <div class="dp-icon" id="dp-icon"></div>
  <div class="dp-kind" id="dp-kind"></div>
  <div class="dp-name" id="dp-name"></div>
  <div id="dp-image-box" class="dp-image-box" style="display:none"><div class="dp-image-label">Image</div><div class="dp-image-val" id="dp-image"></div></div>
  <div class="dp-desc" id="dp-desc"></div>
  <div id="dp-ports-wrap" style="margin-bottom:16px;display:none"><div class="dp-sec-label">Puertos</div><div class="dp-tags" id="dp-ports"></div></div>
  <div id="dp-connects-wrap" style="margin-bottom:16px;display:none"><div class="dp-sec-label">Conecta con</div><div class="dp-tags" id="dp-connects"></div></div>
  <div id="dp-concepts-wrap" style="display:none"><div class="dp-sec-label">Conceptos K8s</div><div class="dp-tags" id="dp-concepts"></div></div>
</div>
<div id="conn-tip"></div>

    // Namespace label pill
    const pillW=box.label.length*6+20;
    const pill=document.createElementNS('http://www.w3.org/2000/svg','rect');
    pill.setAttribute('x',r.x+8);pill.setAttribute('y',r.y-8);
    pill.setAttribute('width',pillW);pill.setAttribute('height',16);
    pill.setAttribute('rx','4');pill.setAttribute('fill','#040A10');
    pill.setAttribute('stroke',box.color+'50');pill.setAttribute('stroke-width','1');
    g.appendChild(pill);

    const lbl=document.createElementNS('http://www.w3.org/2000/svg','text');
    lbl.setAttribute('x',r.x+18);lbl.setAttribute('y',r.y+3);
    lbl.setAttribute('fill',box.color);lbl.setAttribute('font-size','8');
    lbl.setAttribute('font-family','JetBrains Mono,monospace');lbl.setAttribute('font-weight','600');
    lbl.textContent='ns:'+box.label;
    g.appendChild(lbl);
    svg.appendChild(g);
  });

  // 3. Edges
  const edgeGroups=[];
  EDGES.forEach(e=>{
    const f=nm[e.f],t=nm[e.t];if(!f||!t)return;
    const op=edgeOp(e);
    const fx=f.x+NW/2,fy=f.y+NH/2,tx2=t.x+NW/2,ty2=t.y+NH/2;
    const mx=(fx+tx2)/2+(e.lox||0),my=(fy+ty2)/2+(e.loy||0);
    const g=document.createElementNS('http://www.w3.org/2000/svg','g');
    g.style.opacity=op; g.style.transition='opacity .25s';
    g.setAttribute('data-from',e.f); g.setAttribute('data-to',e.t);

    const ln=document.createElementNS('http://www.w3.org/2000/svg','line');
    ln.setAttribute('x1',fx);ln.setAttribute('y1',fy);ln.setAttribute('x2',tx2);ln.setAttribute('y2',ty2);
    ln.setAttribute('stroke',e.color||'#475569');
    ln.setAttribute('stroke-width',e.dash?'1.3':'1.8');
    if(e.dash)ln.setAttribute('stroke-dasharray','5 4');
    ln.setAttribute('marker-end',`url(#arr-${e.mk||'gray'})`);
    ln.classList.add('eln'); g.appendChild(ln);

    if(e.l){
      e.l.split('\n').forEach((txt,i)=>{
        const lbl=document.createElementNS('http://www.w3.org/2000/svg','text');
        lbl.setAttribute('x',mx);lbl.setAttribute('y',my-2+i*11);
        lbl.setAttribute('fill',e.color||'#475569');lbl.setAttribute('font-size','7.5');
        lbl.setAttribute('text-anchor','middle');lbl.setAttribute('font-family','JetBrains Mono,monospace');
        lbl.setAttribute('opacity','0.9');lbl.classList.add('elbl');lbl.textContent=txt;
        g.appendChild(lbl);
      });
    }
    g._from=e.f;g._to=e.t;g._label=e.l||'';
    edgeGroups.push(g);svg.appendChild(g);
  });

  // 4. Nodes
  NODES.forEach(node=>{
    const op=nodeOp(node);
    const g=document.createElementNS('http://www.w3.org/2000/svg','g');
    g.style.cursor='pointer'; g.style.opacity=op; g.style.transition='opacity .25s';

    // Main box
    const rect=document.createElementNS('http://www.w3.org/2000/svg','rect');
    rect.setAttribute('x',node.x);rect.setAttribute('y',node.y);
    rect.setAttribute('width',NW);rect.setAttribute('height',NH);
    rect.setAttribute('rx','8');
    rect.setAttribute('fill','#060D16');
    rect.setAttribute('stroke',node.color);rect.setAttribute('stroke-width','1.4');
    g.appendChild(rect);

    // Colored left accent bar
    const bar=document.createElementNS('http://www.w3.org/2000/svg','rect');
    bar.setAttribute('x',node.x);bar.setAttribute('y',node.y);
    bar.setAttribute('width','3');bar.setAttribute('height',NH);
    bar.setAttribute('rx','8');bar.setAttribute('fill',node.color);
    g.appendChild(bar);

    // Icon
    const icon=document.createElementNS('http://www.w3.org/2000/svg','text');
    icon.setAttribute('x',node.x+12);icon.setAttribute('y',node.y+22);
    icon.setAttribute('font-size','15');icon.textContent=node.icon;
    g.appendChild(icon);

    // Label line 1 (name)
    const labels=node.label.split('\n');
    const lx=node.x+32;
    const l1=document.createElementNS('http://www.w3.org/2000/svg','text');
    l1.setAttribute('x',lx);l1.setAttribute('y',node.y+19);
    l1.setAttribute('fill','#E2E8F0');l1.setAttribute('font-size','9.5');
    l1.setAttribute('font-weight','700');l1.setAttribute('font-family','JetBrains Mono,monospace');
    l1.textContent=labels[0];g.appendChild(l1);

    // Label line 2 (subtext)
    if(labels[1]){
      const l2=document.createElementNS('http://www.w3.org/2000/svg','text');
      l2.setAttribute('x',lx);l2.setAttribute('y',node.y+32);
      l2.setAttribute('fill',node.color);l2.setAttribute('font-size','8');
      l2.setAttribute('font-family','JetBrains Mono,monospace');
      l2.textContent=labels[1];g.appendChild(l2);
    }

    // Role / count strip (bottom)
    if(node.role){
      const strip=document.createElementNS('http://www.w3.org/2000/svg','rect');
      strip.setAttribute('x',node.x+3);strip.setAttribute('y',node.y+NH-16);
      strip.setAttribute('width',NW-3);strip.setAttribute('height',15);
      strip.setAttribute('rx','0');strip.setAttribute('fill',node.color+'22');
      g.appendChild(strip);
      // bottom-left radius fix
      const stripBot=document.createElementNS('http://www.w3.org/2000/svg','rect');
      stripBot.setAttribute('x',node.x+3);stripBot.setAttribute('y',node.y+NH-16);
      stripBot.setAttribute('width',8);stripBot.setAttribute('height',8);
      stripBot.setAttribute('fill',node.color+'22');g.appendChild(stripBot);

      const roleT=document.createElementNS('http://www.w3.org/2000/svg','text');
      roleT.setAttribute('x',node.x+NW/2+1);roleT.setAttribute('y',node.y+NH-5);
      roleT.setAttribute('fill',node.color);roleT.setAttribute('font-size','7');
      roleT.setAttribute('text-anchor','middle');roleT.setAttribute('font-family','JetBrains Mono,monospace');
      roleT.textContent=node.role;g.appendChild(roleT);
    }

    // Badge: STS or DS (top-right corner)
    if(node.sts||node.ds){
      const badgeT=node.sts?'STS':'DS';
      const bRect=document.createElementNS('http://www.w3.org/2000/svg','rect');
      bRect.setAttribute('x',node.x+NW-20);bRect.setAttribute('y',node.y);
      bRect.setAttribute('width',20);bRect.setAttribute('height',13);
      bRect.setAttribute('rx','0');bRect.setAttribute('fill',node.color+'30');
      g.appendChild(bRect);
      const bTxt=document.createElementNS('http://www.w3.org/2000/svg','text');
      bTxt.setAttribute('x',node.x+NW-10);bTxt.setAttribute('y',node.y+10);
      bTxt.setAttribute('fill',node.color);bTxt.setAttribute('font-size','7');
      bTxt.setAttribute('text-anchor','middle');bTxt.setAttribute('font-family','JetBrains Mono,monospace');
      bTxt.setAttribute('font-weight','700');bTxt.textContent=badgeT;g.appendChild(bTxt);
    }

    // Hover — highlight edges + tooltip
    g.addEventListener('mouseenter',()=>{
      rect.setAttribute('stroke-width','2.2');
      rect.setAttribute('fill','#0A1520');
      edgeGroups.forEach(eg=>{
        if(eg._from===node.id||eg._to===node.id){
          eg.style.opacity='1';
          eg.querySelectorAll('line').forEach(l=>{l.setAttribute('stroke-width','2.5');});
        }
      });
      const tip=document.getElementById('conn-tip');
      const conns=EDGES.filter(e=>e.f===node.id||e.t===node.id);
      tip.innerHTML=`<strong style="color:${node.color}">${node.label.replace('\n',' ')}</strong>${node.ns?`<br><span style="color:#334155">ns: ${node.ns}</span>`:''}${conns.length?`<br><span style="color:#475569">${conns.length} conexión(es)</span>`:''}`;
      tip.style.display='block';
    });
    g.addEventListener('mousemove',ev=>{
      const tip=document.getElementById('conn-tip');
      tip.style.left=(ev.clientX+16)+'px';tip.style.top=(ev.clientY-8)+'px';
    });
    g.addEventListener('mouseleave',()=>{
      rect.setAttribute('stroke-width','1.4');rect.setAttribute('fill','#060D16');
      edgeGroups.forEach(eg=>{eg.style.opacity=edgeOp(EDGES.find(e=>e.f===eg._from&&e.t===eg._to)||{})||'';eg.querySelectorAll('line').forEach(l=>l.removeAttribute('stroke-width'));});
      document.getElementById('conn-tip').style.display='none';
    });

    // Click — open panel
    g.addEventListener('click',()=>{
      const podId=NODE_POD_MAP[node.id]||node.id;
      let found=null,nsColors=null;
      Object.entries(NS).forEach(([nsKey,nsVal])=>{
        nsVal.pods.forEach(pod=>{if(pod.id===podId){found=pod;nsColors=NSC[nsKey];}});
      });
      if(found)openPanel(found,'pod',nsColors);
    });

    svg.appendChild(g);
  });

  // 5. HA annotations inside namespace boxes
  addAnnotation(svg, 503, 137, "⟳ BinLog ROW", "#F59E0B");
  addAnnotation(svg, 640, 268, "Quorum\n2/3 votes", "#EF4444");
  addAnnotation(svg, 641, 58, "Sentinel\nsidecar", "#EF4444");
}

function addAnnotation(svg, x, y, text, color){
  const g=document.createElementNS('http://www.w3.org/2000/svg','g');
  g.style.pointerEvents='none';
  const lines=text.split('\n');
  lines.forEach((l,i)=>{
    const t=document.createElementNS('http://www.w3.org/2000/svg','text');
    t.setAttribute('x',x);t.setAttribute('y',y+i*11);
    t.setAttribute('fill',color);t.setAttribute('font-size','7.5');
    t.setAttribute('text-anchor','middle');t.setAttribute('font-family','JetBrains Mono,monospace');
    t.setAttribute('opacity','0.6');t.textContent=l;g.appendChild(t);
  });
  svg.appendChild(g);
}

  const items=[
    {type:'ns',color:'#0EA5E9',  label:'wordpress'},

    {type:'ns',color:'#F97316',  label:'velero'},

    {type:'edge',color:'#8B5CF6',dash:true,  label:'Storage/Trazas'},
    {type:'edge',color:'#EC4899',dash:true,  label:'TLS certs'},

    {type:'sep'},
    {type:'badge',label:'STS = StatefulSet'},
    {type:'badge',label:'DS = DaemonSet'},
    {type:'badge',color:'#EC4899',label:'NP = NetworkPolicy barrier'},

  let html='';
  items.forEach(it=>{
    if(it.type==='sep'){html+='<div style="width:1px;height:20px;background:#1A2F45;margin:0 4px"></div>';return;}
    if(it.type==='ns'){html+=`<div class="legend-item"><div class="legend-dot" style="background:${it.color}25;border:1px dashed ${it.color}60;border-radius:3px"></div><span class="legend-text">ns:${it.label}</span></div>`;return;}
    if(it.type==='edge'){
      const w=it.dash?'border-top:1.5px dashed '+it.color:'background:'+it.color;
      html+=`<div class="legend-item"><div class="legend-line" style="${it.dash?'border-top:2px dashed '+it.color+';background:transparent':'background:'+it.color}"></div><span class="legend-text">${it.label}</span></div>`;return;
    }
    if(it.type==='badge'){html+=`<div class="legend-item"><span class="legend-text" style="color:${it.color||'#475569'}">${it.label}</span></div>`;return;}

}

// ── BUILD FILES ───────────────────────────────────────────────────────────────
function buildFiles(){
  const cats=['Todos',...new Set(FILES.map(f=>f.category))];
  document.getElementById('filter-bar').innerHTML=cats.map(c=>`<button class="filter-btn${c==='Todos'?' active':''}" onclick="filterFiles(this,'${c}')">${c}</button>`).join('');
  renderFiles('Todos');
}
function filterFiles(btn,cat){
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');fileFilter=cat;renderFiles(cat);
}
function renderFiles(cat){
  const filt=cat==='Todos'?FILES:FILES.filter(f=>f.category===cat);
  document.getElementById('files-grid').innerHTML=filt.map(f=>{
    const c=CC[f.category]||'#64748B';
    return `<button class="file-card" onclick="openFilePanel(${JSON.stringify(f).replace(/"/g,'&quot;')})">
      <div class="file-card-top">
        <div class="file-card-left"><span style="font-size:18px">${f.icon}</span><span class="file-name">${f.name}</span></div>
        <span class="file-badge" style="color:${c};border-color:${c}40;background:${c}15">${f.category}</span>
      </div>
      <div class="file-desc">${f.desc}</div>
    </button>`;
  }).join('');
}
function openFilePanel(f){
  const c={accent:'#64748B',text:'#94A3B8',bg:'#1E293B'};
  const c2=CC[f.category];if(c2){c.accent=c2;c.text=c2+'CC';}
  openPanel({icon:f.icon,name:f.name,kind:'',category:f.category,desc:f.desc,image:null,ports:[],connects:[],concepts:f.concepts},'file',c);
}

      <button class="ns-header" onclick="toggleNs('${k}')">

          <div>
            <div class="ns-title" style="color:${c.text}">${ns.label}</div>
            <div class="ns-desc">${ns.desc}</div>
          </div>
        </div>
        <div class="ns-right">
          <span class="ns-count" style="color:${c.accent};border-color:${c.border}40;background:${c.accent}15">${ns.pods.length} pod${ns.pods.length!==1?'s':''}</span>
          <span style="color:${c.accent};font-size:14px" id="ns-arr-${k}">${nsExp[k]?'▾':'▸'}</span>
        </div>
      </button>
      <div class="ns-body" id="ns-body-${k}" style="display:${nsExp[k]?'grid':'none'}">
        ${ns.pods.map(pod=>`<button class="pod-card" style="border-color:${c.border}40" onclick="openPanel(${JSON.stringify(pod).replace(/"/g,'&quot;')},'pod',${JSON.stringify(c).replace(/"/g,'&quot;')})">
          <div class="pod-icon">${pod.icon}</div>
          <div class="pod-name" style="color:${c.text}">${pod.name}</div>
          <div class="pod-badges">
            <span class="pod-badge" style="background:${c.accent}20;color:${c.accent}">${pod.kind}</span>
            <span class="pod-badge" style="background:#1A2F45;color:#475569">${pod.replicas}</span>
          </div>
          ${pod.ports&&pod.ports.length?`<div class="pod-ports">${pod.ports.map(p=>{const o=typeof p==='object'?p:{p,proto:'TCP',desc:''};return`:${o.p}/${o.proto}`;}).join(' · ')}</div>`:''}
        </button>`).join('')}
      </div>
    </div>`;
  }).join('');
}
function toggleNs(k){
  nsExp[k]=!nsExp[k];
  document.getElementById('ns-body-'+k).style.display=nsExp[k]?'grid':'none';
  document.getElementById('ns-arr-'+k).textContent=nsExp[k]?'▾':'▸';
}

  });

  const panel=document.getElementById('detail-panel');
  panel.style.borderLeft=`1px solid ${c.accent}33`;panel.style.boxShadow=`-8px 0 40px ${c.accent}18`;
  document.getElementById('dp-icon').textContent=item.icon||'📦';
  document.getElementById('dp-kind').textContent=type==='pod'?item.kind:item.category;
  document.getElementById('dp-kind').style.color=c.accent;
  document.getElementById('dp-name').textContent=item.name;
  const ib=document.getElementById('dp-image-box');
  if(item.image){document.getElementById('dp-image').textContent=item.image;ib.style.display='block';}else ib.style.display='none';
  document.getElementById('dp-desc').textContent=item.desc||'';
  const pw=document.getElementById('dp-ports-wrap'),pt=document.getElementById('dp-ports');
  if(item.ports&&item.ports.length){
    pt.innerHTML=item.ports.map(p=>{const o=typeof p==='object'?p:{p,proto:'TCP',desc:''};
      return `<div class="dp-connect-item" style="border-color:${c.accent}25"><span style="color:${c.text};font-size:11px">:${o.p} <span style="color:${c.accent};font-size:9px">${o.proto}</span></span>${o.desc?`<span class="dp-connect-proto">${o.desc}</span>`:''}</div>`;
    }).join('');pw.style.display='block';
  }else pw.style.display='none';
  const cw=document.getElementById('dp-connects-wrap'),ct=document.getElementById('dp-connects');
  const conns=item.connects||[];
  if(conns.length){
    ct.innerHTML=conns.map(x=>{const o=typeof x==='object'?x:{to:x,proto:'',desc:''};
      return `<div class="dp-connect-item"><span style="color:#E2E8F0;font-size:10px">${o.to}</span>${o.proto?`<span class="dp-connect-proto">${o.proto}${o.desc?' — '+o.desc:''}</span>`:''}</div>`;
    }).join('');cw.style.display='block';
  }else cw.style.display='none';
  const xw=document.getElementById('dp-concepts-wrap'),xt=document.getElementById('dp-concepts');
  if(item.concepts&&item.concepts.length){xt.innerHTML=item.concepts.map(c2=>`<span class="dp-concept">${c2}</span>`).join('');xw.style.display='block';}else xw.style.display='none';
  panel.classList.add('open');document.getElementById('main').classList.add('panel-open');
}
function closePanel(){
  document.getElementById('detail-panel').classList.remove('open');
  document.getElementById('main').classList.remove('panel-open');
}

// ── INIT ──────────────────────────────────────────────────────────────────────
renderDiagram();
buildLegend();
buildFiles();
buildNamespaces();
buildFlow();
</script>
