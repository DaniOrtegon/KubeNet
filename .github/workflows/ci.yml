name: KubeNet CI — Validación de manifiestos

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  push:
    branches: [main]
    paths:
      - 'k8s/**'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'k8s/**'
      - '.github/workflows/ci.yml'
  workflow_dispatch:

jobs:
  validate:
    name: Validar manifests (kubectl + kubeconform)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.28.0'

      - name: Crear cluster Kind
        uses: helm/kind-action@v1.8.0
        with:
          cluster_name: kubenet-ci

      - name: Crear namespaces
        run: |
          set -e
          for ns in cert-manager databases ingress-nginx keda monitoring security storage velero wordpress; do
            kubectl create namespace "$ns" --dry-run=client -o yaml | kubectl apply -f -
          done

      - name: Validar core (kubectl)
        run: |
          set -e
          kubectl apply -f k8s/core/ --dry-run=server

      - name: Instalar kubeconform
        run: |
          set -e
          KUBECONFORM_VERSION="v0.6.7"
          curl -fsSL "https://github.com/yannh/kubeconform/releases/download/${KUBECONFORM_VERSION}/kubeconform-linux-amd64.tar.gz" \
            | tar -xz
          sudo install -m 0755 kubeconform /usr/local/bin/kubeconform
          kubeconform -v

      - name: Validar manifests con kubeconform
        run: |
          set -e
          kubeconform \
            -strict \
            -summary \
            -ignore-missing-schemas \
            -recursive \
            k8s/

      - name: Resumen
        if: success()
        run: |
          echo "✅ Validación completada correctamente"
          echo " - kubectl: recursos core/nativos"
          echo " - kubeconform: validación recursiva del árbol k8s/"
